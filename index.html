<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>POS Es Kopi Anteng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=1.6">
</head>
<body class="h-screen flex flex-col">

    <header class="header-coffee px-6 flex items-center shadow-2xl no-print">
        <img src="images/erasebg-transformed.png" alt="Logo" class="logo-large">
        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-center header-title-container">
            <h1 class="header-title font-['Bebas_Neue'] text-4xl md:text-5xl text-[#fdf6ec] tracking-widest uppercase">Es Kopi Anteng</h1>
            <p class="header-subtitle text-[#c17f4a] text-[10px] md:text-xs font-bold tracking-[0.4em] uppercase">Rasanya Bikin Anteng</p>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden p-4 gap-4 no-print main-content">
        <main class="flex-1 flex flex-col overflow-hidden">
            <nav class="flex justify-center gap-2 mb-4">
                <button onclick="playSound('click'); filter('all')" id="t-all" class="tab-on px-6 md:px-10 py-2 rounded-xl font-bold text-xs border-2 border-[#3d1c02] btn-bounce bg-white uppercase">SEMUA</button>
                <button onclick="playSound('click'); filter('coffee')" id="t-coffee" class="px-6 md:px-10 py-2 rounded-xl font-bold text-xs border-2 border-[#3d1c02] btn-bounce bg-white uppercase">COFFEE</button>
                <button onclick="playSound('click'); filter('non-coffee')" id="t-non-coffee" class="px-6 md:px-10 py-2 rounded-xl font-bold text-xs border-2 border-[#3d1c02] btn-bounce bg-white uppercase">NON-COFFEE</button>
            </nav>
            <div id="grid-container" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto pr-2 pb-10"></div>
        </main>

        <aside id="desktop-aside" class="w-80 bg-white rounded-[35px] border-4 border-[#3d1c02] flex flex-col shadow-xl overflow-hidden">
            <div class="p-4 bg-[#3d1c02] text-white text-center font-bold tracking-widest text-sm uppercase">Pesanan</div>
            <div class="p-4 border-b">
                <input type="text" id="customer-name" placeholder="NAMA PELANGGAN..." class="w-full p-2 border-2 border-[#3d1c02] rounded-lg text-xs font-bold uppercase focus:outline-none">
            </div>
            <div id="cart-list-desktop" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50"></div>
            <div class="p-6 bg-[#fdf6ec] border-t-4 border-[#3d1c02]">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-500 text-sm uppercase">TOTAL:</span>
                    <span class="total-display text-3xl font-black text-[#3d1c02]">Rp 0</span>
                </div>
                <button onclick="openPay()" class="w-full bg-[#3d1c02] text-white py-4 rounded-xl font-bold text-lg btn-bounce shadow-lg uppercase">BAYAR</button>
            </div>
        </aside>
    </div>

    <div id="mobile-bottom-bar" class="bg-white border-t-4 border-[#3d1c02] p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.1)] flex justify-between items-center no-print">
        <div>
            <p class="text-[10px] font-bold text-gray-400 uppercase">Total</p>
            <p class="total-display text-2xl font-black text-[#3d1c02]">Rp 0</p>
        </div>
        <button onclick="openMobileCart()" class="bg-[#3d1c02] text-white px-8 py-3 rounded-xl font-bold btn-bounce flex items-center gap-2">
            🛒 <span id="cart-count-mob">0</span> ITEM
        </button>
    </div>

    <div id="modal-success" class="modal-bg no-print">
        <div class="bg-white p-8 rounded-[40px] border-[8px] border-[#3d1c02] w-full max-w-[400px] text-center animate-pop mx-4">
            <div class="text-6xl mb-4">✅</div>
            <h2 class="text-2xl font-black text-[#3d1c02] mb-2 uppercase">Berhasil</h2>
            <div class="flex flex-col gap-3">
                <button onclick="finalize(true)" class="w-full bg-[#3d1c02] text-white py-4 rounded-2xl font-bold text-lg btn-bounce shadow-md uppercase">Cetak Struk</button>
                <button onclick="finalize(false)" class="w-full bg-stone-100 text-[#3d1c02] py-4 rounded-2xl font-bold border-2 border-[#3d1c02] btn-bounce uppercase text-sm">Selesai</button>
            </div>
        </div>
    </div>

    <div id="receipt-print" style="font-family: monospace; color: black; display: none; width: 100%; padding: 10px;">
        <center>
            <h3 style="margin:0; font-size: 16px;">ES KOPI ANTENG</h3>
            <p style="margin:0; font-size:10px">Jl. Merpati IV No.22, Menteng Dalam</p>
            <p>--------------------------------</p>
            <p id="p-customer" style="font-weight:bold; text-transform:uppercase; margin:5px 0"></p>
            <p>--------------------------------</p>
        </center>
        <div id="p-items" style="margin: 10px 0; font-size: 12px; line-height: 1.4;"></div>
        <p>--------------------------------</p>
        <div id="p-total" style="font-weight:bold; font-size: 14px;"></div>
        <p id="p-method" style="font-size:10px; margin-top: 5px;"></p>
        <p>--------------------------------</p>
        <center style="margin-top:10px; font-size:10px">
            <p>TERIMA KASIH!</p>
        </center>
    </div>

    <script src="script.js?v=1.6"></script>
</body>
</html>
