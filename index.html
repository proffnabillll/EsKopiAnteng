<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Es Kopi Anteng</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col">

    <header class="header-coffee px-6 flex items-center shadow-2xl no-print">
        <img src="images/erasebg-transformed.png" alt="Logo" class="logo-large">
        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none text-center">
            <h1 class="header-title font-['Bebas_Neue'] text-4xl md:text-5xl text-[#fdf6ec] tracking-widest uppercase">Es Kopi Anteng</h1>
            <p class="text-[#c17f4a] text-[10px] md:text-xs font-bold tracking-[0.4em] uppercase">Rasanya Bikin Anteng</p>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden p-4 gap-4 no-print main-content">
        <main class="flex-1 flex flex-col overflow-hidden">
            <nav class="flex justify-center gap-2 mb-4">
                <button onclick="playSound('click'); filter('all')" id="t-all" class="tab-on px-6 md:px-10 py-2 rounded-xl font-bold text-xs border-2 border-[#3d1c02] btn-bounce bg-white uppercase">SEMUA</button>
                <button onclick="playSound('click'); filter('coffee')" id="t-coffee" class="px-6 md:px-10 py-2 rounded-xl font-bold text-xs border-2 border-[#3d1c02] btn-bounce bg-white uppercase">COFFEE</button>
                <button onclick="playSound('click'); filter('non-coffee')" id="t-non-coffee" class="px-6 md:px-10 py-2 rounded-xl font-bold text-xs border-2 border-[#3d1c02] btn-bounce bg-white uppercase">NON-COFFEE</button>
            </nav>
            <div id="grid-container" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto pr-2 pb-10"></div>
        </main>

        <aside id="desktop-aside" class="w-80 bg-white rounded-[35px] border-4 border-[#3d1c02] flex-col shadow-xl overflow-hidden">
            <div class="p-4 bg-[#3d1c02] text-white text-center font-bold tracking-widest text-sm uppercase">Pesanan</div>
            <div class="p-4 border-b">
                <input type="text" id="customer-name" placeholder="NAMA PELANGGAN..." class="w-full p-2 border-2 border-[#3d1c02] rounded-lg text-xs font-bold uppercase focus:outline-none">
            </div>
            <div id="cart-list-desktop" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50"></div>
            <div class="p-6 bg-[#fdf6ec] border-t-4 border-[#3d1c02]">
                <div class="flex justify-between items-center mb-4">
                    <span class="font-bold text-gray-500 text-sm uppercase">TOTAL:</span>
                    <span class="total-display text-3xl font-black text-[#3d1c02]">Rp 0</span>
                </div>
                <button onclick="playSound('success'); openPay()" class="w-full bg-[#3d1c02] text-white py-4 rounded-xl font-bold text-lg btn-bounce shadow-lg uppercase">BAYAR</button>
            </div>
        </aside>
    </div>

    <div id="mobile-bottom-bar" class="bg-white border-t-4 border-[#3d1c02] p-4 shadow-[0_-5px_15px_rgba(0,0,0,0.1)] flex justify-between items-center">
        <div>
            <p class="text-[10px] font-bold text-gray-400 uppercase">Total</p>
            <p class="total-display text-2xl font-black text-[#3d1c02]">Rp 0</p>
        </div>
        <button onclick="playSound('success'); openMobileCart()" class="bg-[#3d1c02] text-white px-8 py-3 rounded-xl font-bold btn-bounce flex items-center gap-2">
            🛒 <span id="cart-count-mob">0</span> ITEM
        </button>
    </div>

    <div id="modal-mobile-cart" class="modal-bg">...</div>
    <div id="modal-icehot" class="modal-bg">...</div>
    <div id="modal-pay" class="modal-bg">...</div>
    <div id="modal-qris" class="modal-bg">...</div>
    <div id="modal-success" class="modal-bg">...</div>
    <div id="receipt-print">...</div>

    <script src="script.js"></script>
</body>
</html>
